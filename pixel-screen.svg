<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" width="960" height="240" role="img" aria-label="Pixel screen animating between the Android and Apple logos">
  <defs>
    <clipPath id="screenClip">
      <rect x="0" y="0" width="960" height="240" rx="10"/>
    </clipPath>
    <pattern id="pixelGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- ===== flat pixel screen (no frame) ===== -->
